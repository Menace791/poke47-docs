<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Receiver - Poké47</title>  <meta property="og:title" content="Poké47">
  <meta property="og:description" content="Expansion-native documentation for Poké47.">
  <meta property="og:image" content="https://menace791.github.io/poke47-docs/assets/og-image.gif">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">  <link rel="stylesheet" href="../assets/style.css">
  <script>
    // Casefold + diacritic-strip + non-alphanumeric strip so "basculinwhitestriped" matches "Basculin (White-Striped)".
    window.obstagoonNormalize = (s) => (s || '').toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '');
    // Per-tab index state restored on back/forward + reload, not on fresh nav-link clicks.
    window.obstagoonShouldRestoreState = () => {
      const nav = performance.getEntriesByType('navigation')[0];
      return !!(nav && (nav.type === 'back_forward' || nav.type === 'reload'));
    };
    window.obstagoonLoadState = (key) => {
      if (!obstagoonShouldRestoreState()) return {};
      try { return JSON.parse(sessionStorage.getItem('obstagoon:' + key) || '{}'); }
      catch (e) { return {}; }
    };
    window.obstagoonSaveState = (key, state) => {
      // Private browsing / quota-exceeded throws; degrade silently.
      try { sessionStorage.setItem('obstagoon:' + key, JSON.stringify(state)); }
      catch (e) {}
    };
    // Shared search+chips+sort binding for index pages; opts carry the per-page ids and source lists.
    window.obstagoonBindIndexPage = (opts) => {
      const input = document.getElementById(opts.inputId);
      const dropdown = document.getElementById(opts.dropdownId);
      const chipsBox = document.getElementById(opts.chipsBoxId);
      const empty = opts.emptyId ? document.getElementById(opts.emptyId) : null;
      const countEl = opts.countId ? document.getElementById(opts.countId) : null;
      const rows = Array.from(document.querySelectorAll(opts.rowsSelector));
      const haystackByKind = opts.haystackByKind || {};
      const sources = opts.sources || [];
      const defaultKind = opts.defaultKind || null;
      const saved = obstagoonLoadState(opts.stateKey);
      const chips = (Array.isArray(saved.chips) ? saved.chips : [])
        .map((c) => c.kind ? c : {kind: defaultKind || 'Pokémon', name: c.name});
      if (saved.search) input.value = saved.search;
      let activeCol = Number.isInteger(saved.sortCol) ? saved.sortCol : (opts.defaultSortCol ?? 0);
      let activeDir = ['asc', 'desc', ''].includes(saved.sortDir) ? saved.sortDir : (opts.defaultSortDir ?? 'asc');
      const esc = (s) => s.replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      const persist = () => obstagoonSaveState(opts.stateKey, {
        search: input.value, chips,
        ...(opts.tableSelector ? {sortCol: activeCol, sortDir: activeDir} : {}),
      });

      const formCellTargets = ['spriteHtml', 'nameHtml', 'typesHtml', 'abilitiesHtml'];
      const formMatchesChips = (form) => chips.every((c) => {
        const list = form[haystackByKind[c.kind]];
        return Array.isArray(list) && list.includes(c.name);
      });
      const applyFilters = () => {
        const q = obstagoonNormalize(input.value);
        let visible = 0;
        rows.forEach((el) => {
          const text = obstagoonNormalize(el.dataset.searchText || '');
          let show = !q || text.includes(q);
          let target = null;
          if (show && chips.length) {
            if (el.dataset.forms) {
              const forms = JSON.parse(el.dataset.forms);
              target = formMatchesChips(forms[0]) ? forms[0] : forms.find(formMatchesChips) || null;
              show = !!target;
            } else {
              for (const c of chips) {
                const haystack = el.dataset[haystackByKind[c.kind]];
                if (!haystack || !haystack.includes(`|${c.name}|`)) { show = false; break; }
              }
            }
          }
          el.classList.toggle('filter-hidden', !show);
          if (show) visible += 1;
          if (show && el.dataset.forms) applyFormSwap(el, target);
        });
        if (empty) empty.style.display = visible === 0 ? '' : 'none';
        if (countEl) countEl.textContent = visible;
        persist();
      };
      const applyFormSwap = (el, target) => {
        const forms = JSON.parse(el.dataset.forms);
        if (!target) target = forms[0];
        if (el._activeFormSlug === target.slug) return;
        if (el._activeFormSlug === undefined) {
          const cells = el.querySelectorAll('td');
          el._origCells = [cells[1].innerHTML, cells[2].innerHTML, cells[3].innerHTML, cells[4].innerHTML];
          el._origHref = el.dataset.href;
        }
        const cells = el.querySelectorAll('td');
        if (target === forms[0]) {
          [cells[1].innerHTML, cells[2].innerHTML, cells[3].innerHTML, cells[4].innerHTML] = el._origCells;
          el.dataset.href = el._origHref;
        } else {
          formCellTargets.forEach((key, i) => { cells[i + 1].innerHTML = target[key]; });
          el.dataset.href = target.slug + '.html';
        }
        el._activeFormSlug = target.slug;
      };
      const renderChips = () => {
        chipsBox.innerHTML = chips.map((c, i) =>
          `<span class="filter-chip"><span class="chip-kind">${c.kind}</span> ${esc(c.name)}<button type="button" class="chip-remove" data-idx="${i}" aria-label="Remove">×</button></span>`
        ).join('');
        chipsBox.querySelectorAll('.chip-remove').forEach((btn) => btn.addEventListener('click', () => {
          chips.splice(parseInt(btn.dataset.idx, 10), 1); renderChips(); applyFilters();
        }));
      };
      let activeIdx = -1;
      const setActiveIdx = (i) => {
        const items = dropdown.querySelectorAll('.suggestion');
        if (!items.length) return;
        activeIdx = (i + items.length) % items.length;
        items.forEach((b, j) => b.classList.toggle('is-active', j === activeIdx));
        items[activeIdx].scrollIntoView({block: 'nearest'});
      };
      const acceptSuggestion = (btn) => {
        chips.push({kind: btn.dataset.kind, name: btn.dataset.name});
        input.value = ''; dropdown.hidden = true; activeIdx = -1; renderChips(); applyFilters();
      };
      const renderSuggestions = () => {
        const q = obstagoonNormalize(input.value);
        if (q.length < 3) { dropdown.hidden = true; activeIdx = -1; return; }
        const taken = new Set(chips.map((c) => `${c.kind}:${c.name}`));
        const matches = [];
        for (const [kind, list] of sources) {
          for (const v of list) if (obstagoonNormalize(v).includes(q) && !taken.has(`${kind}:${v}`)) matches.push({kind, name: v});
        }
        if (matches.length === 0) { dropdown.hidden = true; activeIdx = -1; return; }
        dropdown.innerHTML = matches.slice(0, 30).map((m) =>
          `<button type="button" class="suggestion" data-kind="${m.kind}" data-name="${esc(m.name)}"><span class="suggestion-kind">${m.kind}</span> ${esc(m.name)}</button>`
        ).join('');
        dropdown.hidden = false;
        activeIdx = -1;
        dropdown.querySelectorAll('.suggestion').forEach((btn) => btn.addEventListener('click', () => acceptSuggestion(btn)));
      };
      input.addEventListener('input', () => { renderSuggestions(); applyFilters(); });
      input.addEventListener('focus', renderSuggestions);
      input.addEventListener('keydown', (e) => {
        if (dropdown.hidden) return;
        const items = dropdown.querySelectorAll('.suggestion');
        if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(activeIdx + 1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(activeIdx <= 0 ? items.length - 1 : activeIdx - 1); }
        else if (e.key === 'Enter') {
          // Priority: manually-arrowed selection > sole remaining suggestion > exact name match (post-normalize).
          let idx = activeIdx;
          if (idx < 0 && items.length === 1) idx = 0;
          if (idx < 0) {
            const q = obstagoonNormalize(input.value);
            idx = Array.from(items).findIndex((b) => obstagoonNormalize(b.dataset.name) === q);
          }
          if (idx >= 0) { e.preventDefault(); acceptSuggestion(items[idx]); }
        }
        else if (e.key === 'Escape') { dropdown.hidden = true; activeIdx = -1; }
      });
      document.addEventListener('click', (e) => { if (!dropdown.contains(e.target) && e.target !== input) dropdown.hidden = true; });
      renderChips();
      applyFilters();

      if (opts.tableSelector) {
        const tbody = document.querySelector(opts.tableSelector + ' tbody');
        const headers = Array.from(document.querySelectorAll(opts.tableSelector + ' thead th'));
        const original = Array.from(tbody.querySelectorAll('tr'));
        const cellValue = (tr, i, kind) => {
          const text = tr.cells[i].textContent.trim();
          if (kind === 'number') { const n = parseFloat(text); return isNaN(n) ? -Infinity : n; }
          return text.toLowerCase();
        };
        const applySort = () => {
          headers.forEach((h, j) => {
            h.classList.toggle('sort-asc', activeDir === 'asc' && j === activeCol);
            h.classList.toggle('sort-desc', activeDir === 'desc' && j === activeCol);
          });
          if (!activeDir) { original.forEach((tr) => tbody.appendChild(tr)); return; }
          const kind = headers[activeCol]?.dataset.sort || 'text';
          const sign = activeDir === 'asc' ? 1 : -1;
          [...original].sort((a, b) => {
            const av = cellValue(a, activeCol, kind), bv = cellValue(b, activeCol, kind);
            return av < bv ? -sign : av > bv ? sign : 0;
          }).forEach((tr) => tbody.appendChild(tr));
        };
        headers.forEach((th, i) => {
          if (!th.dataset.sort) return;
          th.classList.add('sortable');
          th.addEventListener('click', () => {
            activeDir = i !== activeCol ? 'asc' : activeDir === 'asc' ? 'desc' : activeDir === 'desc' ? '' : 'asc';
            activeCol = activeDir ? i : -1;
            applySort();
            persist();
          });
        });
        applySort();
      }
    };
  </script>
</head>
<body>

<div class="card">

<section class="card">
  <h2>Pokémon with this Ability <span class="muted small-text">4</span></h2>
  <ul class="cross-link-grid">
<li><a href="../pokedex/panpour.html">
<img src="../assets/game/graphics/pokemon/panpour/anim_front.png" alt="" class="sprite">  <span class="name">Panpour</span>

<img src="../assets/game/graphics/pokemon/pansage/anim_front.png" alt="" class="sprite">  <span class="name">Pansage</span>
</a></li><li><a href="../pokedex/pansear.html">
<img src="../assets/game/graphics/pokemon/pansear/anim_front.png" alt="" class="sprite">  <span class="name">Pansear</span>

  <script>
    function obstagoonBindFilters() {
      const inputs = document.querySelectorAll('[data-filter-input]');
      inputs.forEach((input) => {
        const selector = input.getAttribute('data-filter-target');
        const emptyTextSelector = input.getAttribute('data-filter-empty');
        const countSelector = input.getAttribute('data-filter-count');
        const items = Array.from(document.querySelectorAll(selector || ''));
        const emptyNode = emptyTextSelector ? document.querySelector(emptyTextSelector) : null;
        const countNode = countSelector ? document.querySelector(countSelector) : null;
        const stateKey = input.id || selector || '';
        const apply = () => {
          const query = obstagoonNormalize(input.value);
          let visible = 0;
          items.forEach((item) => {
            const haystack = obstagoonNormalize(item.getAttribute('data-search-text') || item.textContent || '');
            const match = !query || haystack.includes(query);
            item.classList.toggle('filter-hidden', !match);
            if (match) visible += 1;
          });
          if (emptyNode) emptyNode.style.display = visible === 0 ? '' : 'none';
          if (countNode) countNode.textContent = visible;
          if (stateKey) obstagoonSaveState(stateKey, {search: input.value});
        };
        if (stateKey) {
          const saved = obstagoonLoadState(stateKey);
          if (saved.search) input.value = saved.search;
        }
        input.addEventListener('input', apply);
        apply();
      });
    }
    function obstagoonBindRowLinks() {
      // data-href rows act as buttons; nested <a>/<button> keep their own click semantics.
      document.querySelectorAll('tr[data-href], li[data-href], td[data-href]').forEach((row) => {
        row.addEventListener('click', (e) => {
          if (e.target.closest('a, button')) return;
          window.location = row.getAttribute('data-href');
        });
      });
    }
    function obstagoonBindLinkedHotspots() {
      // Hover-mirror encounter-map hotspots and matching link-grid tiles via shared href.
      const partners = new Map();
      document.querySelectorAll('.region-map a[href], .link-grid > li > a[href]').forEach((a) => {
        const key = a.getAttribute('href');
        if (!partners.has(key)) partners.set(key, []);
        partners.get(key).push(a);
      });
      partners.forEach((group) => {
        if (group.length < 2) return;
        group.forEach((el) => {
          el.addEventListener('mouseenter', () => group.forEach((other) => { if (other !== el) other.classList.add('linked-hover'); }));
          el.addEventListener('mouseleave', () => group.forEach((other) => other.classList.remove('linked-hover')));
        });
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => { obstagoonBindFilters(); obstagoonBindRowLinks(); obstagoonBindLinkedHotspots(); });
    } else {
      obstagoonBindFilters();
      obstagoonBindRowLinks();
      obstagoonBindLinkedHotspots();
    }
  </script>
</body>
